<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Oraciones Mágicas</title>
    <!-- IMPORTAMOS LA TIPOGRAFÍA SEGURO PARA NIÑOS (REDONDEADA Y RECTA) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dia: #FFD700; /* Amarillo brillante */
            --bg-noche: #34495e;
            --bg-naturaleza: #a2d149;
        }

        body {
            /* CAMBIO AQUÍ: Ahora usará Fredoka en móvil y PC, eliminando la cursiva molesta */
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* TARJETA DECORADA */
        #prayerCard {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            background: var(--bg-dia);
            border: 8px solid white;
            position: relative;
            transition: all 0.4s ease;
        }

        /* Iconos decorativos */
        #cardDecoration {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        #prayerText {
            font-size: 1.4rem;
            color: #444;
            font-weight: bold;
            line-height: 1.3;
            text-align: center;
            margin: 0;
        }

        /* Estilos por tema */
        .noche { background: var(--bg-noche) !important; border-color: #2c3e50 !important; }
        .noche #prayerText { color: #ecf0f1; }
        
        .naturaleza { background: var(--bg-naturaleza) !important; border-color: #82b73a !important; }
        .naturaleza #prayerText { color: #1b4332; }

        /* CONTROLES */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn {
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Fredoka', sans-serif; /* Forzamos la fuente en botones */
        }

        #micBtn { background-color: #4a90e2; color: white; }
        #micBtn.listening { 
            background-color: #e74c3c; 
            animation: pulse 1.5s infinite;
        }

        #downloadBtn { background-color: #27ae60; color: white; }

        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .dot {
            width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; border: 4px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .hint { color: #94a3b8; font-size: 0.85rem; font-style: normal; } /* Quitamos italic para asegurar legibilidad */
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #4a90e2; margin-bottom: 10px;">🙏 Mis Palabras</h2>
    
    <div id="prayerCard">
        <div id="cardDecoration">☀️</div>
        <p id="prayerText">"Pulsa el botón azul para empezar..."</p>
    </div>

    <div class="controls">
        <button id="micBtn" class="btn">
            <span id="btnIcon">🎤</span> <span id="btnText">Hablar</span>
        </button>
        
        <button id="downloadBtn" class="btn">
            <span>💾</span> Guardar Foto para WhatsApp
        </button>

        <div class="theme-selector">
            <div class="dot" style="background: var(--bg-dia);" onclick="setTheme('dia', '☀️')"></div>
            <div class="dot" style="background: var(--bg-noche);" onclick="setTheme('noche', '✨')"></div>
            <div class="dot" style="background: var(--bg-naturaleza);" onclick="setTheme('naturaleza', '🌿')"></div>
        </div>
        
        <p class="hint">Tu sobrina puede elegir su color favorito arriba.</p>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const prayerText = document.getElementById('prayerText');
    const prayerCard = document.getElementById('prayerCard');
    const cardDeco = document.getElementById('cardDecoration');
    const downloadBtn = document.getElementById('downloadBtn');

    let isListening = false;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true; 
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const text = event.results[event.results.length - 1][0].transcript;
            prayerText.innerText = `"${text}"`;
        };

        recognition.onerror = () => { stopListening(); };
    }

    micBtn.onclick = () => {
        if (!isListening) {
            startListening();
        } else {
            stopListening();
        }
    };

    function startListening() {
        if (!recognition) return;
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        btnText.innerText = "¡Te escucho! (Pulsar para parar)";
        btnIcon.innerText = "🛑";
        prayerText.innerText = "...";
    }

    function stopListening() {
        if (!recognition) return;
        recognition.stop();
        isListening = false;
        micBtn.classList.remove('listening');
        btnText.innerText = "Hablar";
        btnIcon.innerText = "🎤";
    }

    function setTheme(theme, icon) {
        prayerCard.className = theme === 'dia' ? '' : theme;
        cardDeco.innerText = icon;
        if(theme === 'dia') {
            prayerCard.style.background = 'var(--bg-dia)';
        } else {
            prayerCard.style.background = '';
        }
    }

    downloadBtn.onclick = () => {
        html2canvas(prayerCard, {
            scale: 3,
            backgroundColor: null
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'mi-oracion.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    };
</script>

</body>
</html>
